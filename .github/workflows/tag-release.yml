name: tag-release

# Tags a release only when the plugin's version actually changed.
#
# The version in .claude-plugin/plugin.json is what decides whether an installed
# plugin sees an update at all: Claude Code uses it as the cache key, so pushing
# commits without bumping it delivers nothing to anyone. That makes the bump the
# real release event, and this the thing that records it — ordinary commits to
# main leave no tag behind, which is the whole point.
on:
  push:
    branches: [main]

# Pushing a tag is a write, and the only write this needs. Everything else stays
# read-only.
permissions:
  contents: write

jobs:
  tag:
    name: tag when the version changed
    runs-on: ubuntu-latest
    steps:
      # Full history: the job's first question is "what was the version before
      # this push", and the shallow clone CI defaults to cannot answer it.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Tag if .claude-plugin/plugin.json bumped the version
        env:
          # github.event.before is what main pointed at before this push, which
          # is more honest than HEAD^: a push can carry several commits, and a
          # merge commit's first parent is not always the old tip.
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          MANIFEST=.claude-plugin/plugin.json
          NAME=$(jq -r .name "$MANIFEST")
          VERSION=$(jq -r .version "$MANIFEST")

          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            # No explicit version means the plugin is versioned by commit SHA
            # instead, and every commit is already its own version. Tagging that
            # would be one tag per commit, which is noise, not history.
            echo "::notice::$MANIFEST has no version field — nothing to tag."
            exit 0
          fi

          # The second manifest carries the same number, and nothing but this
          # check stops the two drifting. A silent skip would be the wrong call:
          # a half-bumped release is a bug you want to hear about now, not to
          # discover from a tag that disagrees with what npm thinks it shipped.
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::package.json is $PKG_VERSION but $MANIFEST is $VERSION — bump both."
            exit 1
          fi

          # Same check `claude plugin tag` makes locally. The entry carries no
          # version today, and plugin.json wins when both are set, but a stale
          # number sitting in the marketplace is exactly the kind of thing nobody
          # notices until a user installs the wrong release.
          ENTRY_VERSION=$(jq -r --arg n "$NAME" \
            '.plugins[]? | select(.name == $n) | .version // "absent"' \
            .claude-plugin/marketplace.json)
          if [ "$ENTRY_VERSION" != "absent" ] && [ "$ENTRY_VERSION" != "$VERSION" ]; then
            echo "::error::marketplace entry says $ENTRY_VERSION but $MANIFEST says $VERSION."
            exit 1
          fi

          # A brand-new branch, or a force push, reports an all-zero "before" and
          # has no previous version to compare against. Treat that as changed and
          # let the tag-exists check below be what prevents a duplicate — the
          # alternative, skipping, silently drops the tag for a real release.
          PREVIOUS=""
          if [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            PREVIOUS=$(git show "$BEFORE:$MANIFEST" 2>/dev/null | jq -r .version || echo "")
          fi

          if [ "$PREVIOUS" = "$VERSION" ]; then
            echo "Version unchanged at $VERSION — no tag."
            exit 0
          fi

          TAG="$NAME--v$VERSION"

          # Idempotent on purpose. A re-run of this job, or a second push that
          # touches nothing but the changelog, must not fail the build over a tag
          # that is already exactly where it belongs.
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::$TAG already exists — leaving it alone."
            exit 0
          fi

          # Annotated, matching what `claude plugin tag` creates by hand, so a
          # release tagged from a laptop and one tagged here are the same object.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$NAME $VERSION"
          git push origin "refs/tags/$TAG"

          echo "::notice::Tagged $TAG at $GITHUB_SHA"
