# Custom secret rules for Trivy, picked up automatically by `trivy fs`.
#
# Trivy's built-in rules know GitHub, AWS, Slack and friends — but not Telegram
# bot tokens, which is the one secret this repository actually handles. Measured,
# not assumed: a token pasted into a .ts file is reported clean by the stock
# ruleset, so the scanner would pass with the credential sitting in the diff.
#
# The token is what lets anyone drive Claude on the host, so a leak is not a
# "rotate it later" event.
rules:
  - id: telegram-bot-token
    category: Telegram
    title: Telegram Bot Token
    severity: CRITICAL
    # <bot-id>:<35-char secret>, e.g. 7891234567:AAH...
    regex: '\b[0-9]{8,10}:AA[A-Za-z0-9_-]{33}\b'
    keywords:
      - ":AA"
